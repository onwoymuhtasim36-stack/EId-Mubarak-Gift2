
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Mubarak for Opu Mama</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Unique Deep Radial Gradient Background */
            background: radial-gradient(circle, #2c5364 0%, #203a43 60%, #0f2027 100%);
            font-family: Arial, sans-serif;
            color: #ffffff;
            overflow: hidden; /* Prevent scrollbars */
        }

        .container {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05); /* Subtle transparent card background */
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); /* Depth shadow */
            backdrop-filter: blur(10px); /* Optional blur, depends on browser */
            max-width: 800px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.1); /* Subtle white border */
        }

        .text-content {
            margin-right: 40px;
            flex: 1; /* Allow content to grow */
        }

        h1 {
            font-size: 3rem;
            color: #f1c40f; /* Golden Color */
            margin-bottom: 5px;
        }

        h2 {
            font-size: 2.2rem;
            color: #ffffff;
            margin-top: 0;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .heart {
            color: #e74c3c; /* Red heart color */
        }

        .sign-off {
            font-size: 1rem;
            margin-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 20px;
        }

        .moon-icon {
            font-size: 8rem;
            color: #f1c40f; /* Golden Moon */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Responsive Design for Smaller Screens */
        @media (max-width: 600px) {
            .container {
                flex-direction: column;
                text-align: center;
                padding: 20px;
            }

            .text-content {
                margin-right: 0;
                margin-bottom: 20px;
            }

            h1 {
                font-size: 2.2rem;
            }

            h2 {
                font-size: 1.8rem;
            }

            .moon-icon {
                font-size: 6rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="text-content">
            <h1>Eid Mubarak!</h1>
            <h2>Dear Opu Mama</h2>
            <p>Wishing you a joy-filled Eid with lots of love and happiness.<span class="heart">❤️</span></p>
            <p>May this special day bring you close to your family and friends, filling your heart with peace and prosperity.</p>
            <p>Enjoy every moment! Eid is about celebration and being together.</p>
            
                
        
        </div>
        <div class="moon-icon">
            🌙<br><span style="font-size: 2rem;">✨</span>
        </div>
    </div>
</body>
</html>
